<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini E-Commerce</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:25px;
}

input,select{
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 16px;
border:none;
background:#007bff;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:120px;
height:120px;
object-fit:contain;
}

.card h3{
font-size:16px;
height:60px;
overflow:hidden;
margin:10px 0;
}

.price{
color:green;
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.cart-box{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<h1>Mini E-Commerce App</h1>

<div class="cart-box">
<h2>Cart Items: <span id="cartCount">0</span></h2>
<h2>Total: $<span id="total">0</span></h2>
</div>

<div class="controls">

<input
type="text"
id="search"
placeholder="Search Product"
>

<select id="category">

<option value="all">All Categories</option>
<option value="electronics">Electronics</option>
<option value="jewelery">Jewelery</option>
<option value="men's clothing">Men's Clothing</option>
<option value="women's clothing">Women's Clothing</option>

</select>

<select id="sort">

<option value="default">Sort Price</option>
<option value="low">Low → High</option>
<option value="high">High → Low</option>

</select>

</div>

<div id="products"></div>

<script>

let allProducts = [];
let cart = [];

async function fetchProducts(){

let res = await fetch(
"https://fakestoreapi.com/products/"
);

allProducts = await res.json();

displayProducts(allProducts);

}

function displayProducts(products){

document.getElementById("products")
.innerHTML = products.map(product=>`

<div class="card">

<img src="${product.image}">

<h3>${product.title}</h3>

<p>${product.category}</p>

<p class="price">$${product.price}</p>

<button onclick="addToCart(${product.id})">
Add To Cart
</button>

</div>

`).join("");

}

function filterProducts(){

let searchValue =
document.getElementById("search")
.value.toLowerCase();

let categoryValue =
document.getElementById("category")
.value;

let sortValue =
document.getElementById("sort")
.value;

let filtered = [...allProducts];

filtered = filtered.filter(product=>{

let matchSearch =
product.title
.toLowerCase()
.includes(searchValue);

let matchCategory =
categoryValue==="all" ||
product.category===categoryValue;

return matchSearch && matchCategory;

});

if(sortValue==="low"){

filtered.sort(
(a,b)=>a.price-b.price
);

}

if(sortValue==="high"){

filtered.sort(
(a,b)=>b.price-a.price
);

}

displayProducts(filtered);

}

function addToCart(id){

let product =
allProducts.find(p=>p.id===id);

cart.push(product);

updateCart();

}

function updateCart(){

document.getElementById("cartCount")
.innerText = cart.length;

let total = cart.reduce(
(sum,item)=>sum+item.price,
0
);

document.getElementById("total")
.innerText = total.toFixed(2);

}

document
.getElementById("search")
.addEventListener(
"input",
filterProducts
);

document
.getElementById("category")
.addEventListener(
"change",
filterProducts
);

document
.getElementById("sort")
.addEventListener(
"change",
filterProducts
);

fetchProducts();

</script>

</body>
</html>
